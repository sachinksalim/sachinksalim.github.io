<!DOCTYPE html>
<html lang=en ng-app=mainApp>
    <head>
        <meta charset=utf-8>
        <title>Karukappadath house</title>
        <link href=web.css id="styles" rel=stylesheet>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>  
        <script src=https://ajax.googleapis.com/ajax/libs/angularjs/1.3.14/angular.min.js></script>
        <script src=https://ajax.googleapis.com/ajax/libs/angularjs/1.3.14/angular-route.min.js></script>
        <link href="https://fonts.googleapis.com/css?family=Fresca" rel="stylesheet">
    </head>
    <script>
      $(document).ready(function(){
      $('#mode').click(function(){
      if($('link#styles').attr('href')=="web.css"){
        $('#mode').attr('value','Switch To Web Mode')
        $('link#styles').attr('href','print.css')
      }
      else
      {
      $('#mode').attr('value','Switch To Print Mode')
      $('link#styles').attr('href','web.css')
      }
      })

      });
    </script>
    <body>
        <div class="A4">
          <div id=personalData>
            <div class="header">
              <input type=button id="mode" text="Switch Mode" class="btn btn-primary no-print" value="Switch To Print Mode" >
              <p><b>FAMILY TREE</b></p>
<!--              <div id="debug">A</div>-->
            </div>
            <div ng-view></div>
            <div class="footer">
              <p>Designed by: Sachin K Salim</p>
            </div>
          </div>
        </div>
    </body>
    <script src=data.js></script>
    <script src=script.js></script>
    <script src=family.js></script>
</html>
